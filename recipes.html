<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vergés | Recipes</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="Private recipe collection">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FDFBF7;
      --text: #2C2C2C;
      --text-light: #6B6B6B;
      --accent: #C4A77D;
      --card-bg: #FFFFFF;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      --tag-vegan: #7A9E7E;
      --tag-vegetarian: #D4A574;
      --border: #E8E4DE;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .header { display: flex; justify-content: space-between; align-items: center; padding: 2rem 4rem; border-bottom: 1px solid var(--border); }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 500; }
    .logo-sub { font-weight: 300; color: var(--text-light); margin-left: 0.5rem; }
    .nav-link { font-size: 0.875rem; color: var(--text-light); text-decoration: none; }
    .intro { text-align: center; padding: 1.5rem; font-size: 0.75rem; color: var(--text-light); background: rgba(196, 167, 125, 0.1); }
    
    .pricing-summary { background: white; padding: 2rem; margin: 2rem 4rem; border-radius: 8px; box-shadow: var(--shadow); }
    .pricing-summary h2 { font-family: 'Playfair Display', serif; font-size: 1.25rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    .pricing-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    .pricing-table th { text-align: left; padding: 0.75rem; border-bottom: 2px solid var(--text); font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; }
    .pricing-table td { padding: 0.75rem; border-bottom: 1px dashed var(--border); }
    .pricing-table td.num { text-align: right; }
    .pricing-table .total-row { background: var(--bg); font-weight: 600; }
    .pricing-table input { width: 70px; padding: 0.25rem; border: 1px solid var(--border); border-radius: 4px; text-align: right; font-size: 0.875rem; }
    
    .recipe-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 2rem; padding: 2rem 4rem 4rem; max-width: 1400px; margin: 0 auto; }
    .recipe-card { background: white; border-radius: 8px; padding: 2rem; box-shadow: var(--shadow); }
    .recipe-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
    .recipe-name { font-family: 'Playfair Display', serif; font-size: 1.25rem; }
    .recipe-category { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-light); }
    .recipe-section { margin-bottom: 1.5rem; }
    .recipe-section h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-light); margin-bottom: 0.75rem; }
    .recipe-section ul { list-style: none; padding-left: 0; }
    .recipe-section li { font-size: 0.875rem; padding: 0.25rem 0; border-bottom: 1px dashed var(--border); }
    .placeholder-text { font-size: 0.875rem; color: var(--text-light); font-style: italic; }
    
    .cost-breakdown { background: var(--bg); padding: 1rem; border-radius: 4px; margin-top: 1rem; }
    .cost-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px dashed var(--border); font-size: 0.875rem; }
    .cost-row.total { border-top: 2px solid var(--text); border-bottom: none; font-weight: 600; margin-top: 0.5rem; padding-top: 0.75rem; }
    .cost-label { color: var(--text-light); }
    .cost-value { font-weight: 500; }
    .margin-positive { color: var(--tag-vegan); }
    .margin-negative { color: #C44;
    .baking-info { display: flex; gap: 1rem; margin: 0.5rem 0 1rem; }
    .baking-info div { flex: 1; text-align: center; padding: 0.5rem; border: 1px solid var(--border); border-radius: 4px; }
    .baking-label { font-size: 0.625rem; text-transform: uppercase; color: var(--text-light); }
    .baking-value { font-weight: 600; }
    
    .ingredients-cost { margin-top: 1rem; }
    .ingredients-cost table { width: 100%; font-size: 0.75rem; border-collapse: collapse; }
    .ingredients-cost th { text-align: left; padding: 0.5rem; border-bottom: 1px solid var(--border); color: var(--text-light); text-transform: uppercase; font-size: 0.625rem; }
    .ingredients-cost td { padding: 0.5rem; border-bottom: 1px dashed var(--border); }
    .ingredients-cost td:last-child { text-align: right; }
    
    @media (max-width: 768px) { .header { padding: 1.5rem 2rem; } .recipe-list { grid-template-columns: 1fr; padding: 2rem; } .pricing-summary { margin: 1rem; padding: 1rem; } }
  </style>
</head>
<body>
  <header class="header">
    <h1 class="logo">Vergés <span class="logo-sub">Recipes</span></h1>
    <nav class="nav">
      <a href="index.html" class="nav-link">Store</a>
    </nav>
  </header>
  <section class="intro">
    <p>Private recipe collection. Not indexed for SEO. Edit ingredient prices below to update calculations.</p>
  </section>
  
  <section class="pricing-summary">
    <h2>Ingredient Prices (per kg/L)</h2>
    <table class="pricing-table">
      <thead>
        <tr>
          <th>Ingredient</th>
          <th>Price/kg</th>
          <th>Unit</th>
        </tr>
      </thead>
      <tbody id="ingredient-prices">
      </tbody>
    </table>
  </section>

  <section class="recipe-list" id="recipes"></section>
  <script>
// Ingredient prices per kg (from Costco data only)
    const ingredientPrices = {
      // From Costco
      "butter": { price: 4.82, unit: "lb" },
      "unsalted butter": { price: 4.82, unit: "lb" },
      "eggs": { price: 1.84, unit: "dozen" },
      "egg": { price: 1.84, unit: "dozen" },
      "egg yolk": { price: 2.76, unit: "dozen" },
      "heavy whipping cream": { price: 4.37, unit: "lb" },
      "cream": { price: 4.37, unit: "lb" },
      "milk": { price: 3.91, unit: "gal" },
      "lemons": { price: 1.28, unit: "lb" },
      "walnuts": { price: 15.00, unit: "kg" }
    };
    
    // Display ingredient prices table
    const pricesTable = document.getElementById('ingredient-prices');
    Object.entries(ingredientPrices).forEach(([name, data]) => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${name}</td>
        <td class="num">$${data.price.toFixed(2)}</td>
        <td>/${data.unit}</td>
      `;
      pricesTable.appendChild(row);
    });

    // Parse ingredient quantity from string and calculate cost
    function parseAndCost(ing) {
      const match = ing.match(/^([\d.]+)\s*(g|kg|ml|L|oz|lb|dozen|fl oz)\s+(.+)$/);
      if (!match) return { amount: 0, unit: 'g', name: ing, cost: 0 };
      
      let amount = parseFloat(match[1]);
      let unit = match[2];
      let name = match[3].toLowerCase().trim();
      
      // Find matching price
      let priceData = null;
      let foundName = null;
      for (const [key, data] of Object.entries(ingredientPrices)) {
        if (name.includes(key) || key.includes(name.split(' ')[0])) {
          priceData = data;
          foundName = key;
          break;
        }
      }
      
      if (!priceData) return { amount, unit, name, cost: 0 };
      
      // Convert to price unit
      let cost = 0;
      const priceUnit = priceData.unit;
      
      // Convert input to base unit (g, ml, or item)
      let baseAmount = amount;
      if (unit === 'kg') baseAmount = amount * 1000;
      else if (unit === 'lb') baseAmount = amount * 453.6;
      else if (unit === 'oz') baseAmount = amount * 28.35;
      else if (unit === 'L') baseAmount = amount * 1000;
      else if (unit === 'ml') baseAmount = amount;
      else if (unit === 'dozen') baseAmount = amount * 12; // eggs
      else if (unit === 'fl oz') baseAmount = amount * 29.57;
      
      // Convert price to base unit
      let priceInBase = priceData.price;
      if (priceUnit === 'kg') priceInBase = priceData.price / 1000;
      else if (priceUnit === 'lb') priceInBase = priceData.price / 453.6;
      else if (priceUnit === 'L') priceInBase = priceData.price / 1000;
      else if (priceUnit === 'gal') priceInBase = priceData.price / 3785; // gallon to ml
      else if (priceUnit === 'dozen') priceInBase = priceData.price / 12;
      
      cost = baseAmount * priceInBase;
      
      return { amount, unit, name: foundName || name, cost };
    }
    
    const products = [
      { id: "sourdough", name: "Sourdough Bread", category: "bread", price: 8, weight: 600, ingredients: ["500g flour", "350ml water", "10g salt", "sourdough starter"], tags: ["vegan"], image: "images/sourdough_bread.png" },
      { id: "white-sourdough", name: "White Sourdough Bread", category: "bread", price: 8, weight: 600, ingredients: ["500g bread flour", "350ml water", "10g salt", "sourdough starter"], tags: ["vegan"], image: "images/white_sourdough_bread.png" },
      { id: "whole-grain-sourdough", name: "Whole Grain Sourdough", category: "bread", price: 9, weight: 600, ingredients: ["300g bread flour", "200g whole wheat flour", "350ml water", "10g salt", "sourdough starter"], tags: ["vegan"], image: "images/whole_grain_sourdough.png" },
      { id: "broma-cookie", name: "Broma Chocolate Chip Cookie", category: "cookie", price: 3.5, weight: 50, ingredients: ["168g butter", "200g brown sugar, packed", "50g granulated sugar", "1 egg + 1 egg yolk", "15ml vanilla extract", "220g flour", "3g baking soda", "4g kosher salt", "170g dark chocolate chunks"], tags: ["vegetarian"], image: "images/broma_cookie.png", yield: 14, recipe: { prep: ["Line baking sheets with parchment before starting.", "If using salted butter, omit additional kosher salt.", "Gather all ingredients and equipment before beginning."], bake: { temp: "350°F", time: "11-12 min", yield: "14 cookies" }, steps: ["Place butter in a skillet over medium heat. Let it melt, then continue cooking, stirring occasionally.", "Watch carefully as butter transforms - it will bubble, foam, then turn deep golden brown with a nutty aroma (brown butter).", "Remove from heat and pour into a heatproof bowl. Let it cool for 5-10 minutes. If too hot, it will cook the eggs.", "Add brown sugar and granulated sugar to cooled brown butter. Whisk until combined.", "Crack in the egg and add egg yolk. Pour in vanilla. Whisk until completely smooth.", "Add flour, baking soda, and kosher salt. Stir with spatula until just combined. Stop as soon as no dry flour remains.", "Fold in chocolate chunks until evenly distributed.", "Let dough rest for 10 minutes at room temperature, or cover and refrigerate for later use.", "Scoop dough onto prepared baking sheets, leaving at least 5cm between each mound.", "Bake until edges turn golden brown but centers still look slightly soft and doughy. Don't overbake.", "Remove from oven and let cool on sheet for 5 minutes. While still warm, sprinkle with flaky sea salt if desired.", "After 5 minutes, transfer to a wire rack. Best eaten warm when chocolate is still melty."], tips: ["The brown butter is what gives these cookies their incredible depth of flavor.", "Using good quality chocolate makes a noticeable difference.", "Don't overbake - cookies continue cooking on the hot pan after removing from oven."] } },
      { id: "mexican-wedding-cookies", name: "Mexican Wedding Cookies", category: "cookie", price: 2.5, weight: 15, ingredients: ["227g butter", "57g confectioners' sugar", "7ml vanilla extract", "5ml almond extract (optional)", "5g salt", "72g almond flour", "270g flour"], tags: ["vegetarian"], image: "images/mexican_wedding_cookies.png", yield: 48, recipe: { prep: ["Preheat oven to 325°F.", "Lightly grease or line two baking sheets with parchment."], bake: { temp: "325°F", time: "15-20 min", yield: "48 cookies" }, steps: ["In a large bowl, beat together butter, sugar, vanilla, almond extract, and salt until smooth.", "Beat in almond flour, then flour, until just combined.", "Scoop chestnut-sized (1\") pieces of dough and roll into balls. A level teaspoon cookie scoop works perfectly.", "Place balls on prepared baking sheets, leaving 1\" between them.", "Bake for 15-20 minutes until set on top. Some may start to barely brown around edges.", "While baking, put coating sugar in a shallow bowl.", "Remove from oven, cool on pan for a few minutes.", "Transfer 5-6 cookies at a time to bowl with sugar. Roll to coat evenly.", "Transfer to rack to cool completely.", "Roll in sugar again when cool for thorough snowy-white coating.", "Store airtight at room temperature for several days; freeze for longer storage."], tips: ["If using salted butter, reduce added salt to 1/2 teaspoon.", "Also known as Russian Teacakes, or Vanilla Snowballs.", "For extra tender texture, use almond flour or finely ground blanched almonds.", "Roll twice in sugar - once warm, once cool - for the classic snowy appearance."] } },
      { id: "baklava", name: "Baklava", category: "cookie", price: 4, weight: 80, ingredients: ["300g phyllo dough", "150g butter", "300g walnuts", "200g honey", "150g sugar", "10g cinnamon"], tags: ["vegetarian"], image: "images/baklava.png" }
    ];
    
    const container = document.getElementById('recipes');
    products.forEach(product => {
      const ingredientsList = product.ingredients.map(i => `<li>${i}</li>`).join('');
      
      // Calculate costs
      let totalCost = 0;
      let ingredientCosts = [];
      product.ingredients.forEach(ing => {
        const result = parseAndCost(ing);
        totalCost += result.cost;
        ingredientCosts.push({ name: result.name, cost: result.cost });
      });
      
      // Calculate per unit
      const units = product.yield || 1;
      const costPerUnit = totalCost / units;
      const pricePerKg = (product.price / product.weight) * 1000;
      const costPerKg = (totalCost / product.weight) * 1000;
      const margin = product.price - costPerUnit;
      const marginPercent = ((margin / product.price) * 100).toFixed(1);
      
      let recipeDetails = '';
      if (product.yield) {
        const prepSteps = product.recipe?.prep?.map(p => `<li>${p}</li>`).join('') || '';
        const bakeSteps = product.recipe?.steps?.map(s => `<li>${s}</li>`).join('') || '';
        const tips = product.recipe?.tips?.map(t => `<li>${t}</li>`).join('') || '';
        recipeDetails = `
          <div class="recipe-section">
            <h3>Preparation</h3>
            <ul>${prepSteps}</ul>
          </div>
          <div class="recipe-section">
            <h3>Baking</h3>
            <div class="baking-info">
              <div><div class="baking-label">Temp</div><div class="baking-value">${product.recipe?.bake?.temp || '---'}</div></div>
              <div><div class="baking-label">Time</div><div class="baking-value">${product.recipe?.bake?.time || '---'}</div></div>
              <div><div class="baking-label">Yield</div><div class="baking-value">${product.yield}</div></div>
            </div>
          </div>
          <div class="recipe-section">
            <h3>Steps</h3>
            <ol style="padding-left: 1.2rem;">${bakeSteps}</ol>
          </div>
          <div class="recipe-section">
            <h3>Tips</h3>
            <ul>${tips}</ul>
          </div>
        `;
      } else {
        recipeDetails = `
          <div class="recipe-section">
            <h3>Execution Details</h3>
            <p class="placeholder-text">[Add execution steps for ${product.name}]</p>
          </div>
        `;
      }
      
      const card = document.createElement('div');
      card.className = 'recipe-card';
      card.innerHTML = `
        <div class="recipe-header">
          <h2 class="recipe-name">${product.name}</h2>
          <span class="recipe-category">${product.category}</span>
        </div>
        
        <div class="recipe-section">
          <h3>Ingredients</h3>
          <ul>${ingredientsList}</ul>
        </div>
        
        ${recipeDetails}
        
        <div class="recipe-section">
          <h3>Cost Analysis (${units} units)</h3>
          <div class="cost-breakdown">
            <div class="cost-row">
              <span class="cost-label">Total batch cost</span>
              <span class="cost-value">$${totalCost.toFixed(2)}</span>
            </div>
            <div class="cost-row">
              <span class="cost-label">Cost per unit</span>
              <span class="cost-value">$${costPerUnit.toFixed(2)}</span>
            </div>
            <div class="cost-row">
              <span class="cost-label">Price/kg</span>
              <span class="cost-value">$${pricePerKg.toFixed(2)}</span>
            </div>
            <div class="cost-row">
              <span class="cost-label">Cost/kg</span>
              <span class="cost-value">$${costPerKg.toFixed(2)}</span>
            </div>
            <div class="cost-row total">
              <span class="cost-label">Margin/unit</span>
              <span class="cost-value ${margin >= 0 ? 'margin-positive' : 'margin-negative'}">$${margin.toFixed(2)} (${marginPercent}%)</span>
            </div>
          </div>
        </div>
        
        <div class="recipe-section">
          <h3>Selling Price</h3>
          <div style="font-family: 'Playfair Display', serif; font-size: 2rem;">$${product.price}</div>
        </div>
        
        <div class="recipe-section">
          <h3>Notes</h3>
          <p class="placeholder-text">[Add notes for ${product.name}]</p>
        </div>
      `;
      container.appendChild(card);
    });
  </script>
</body>
</html>
