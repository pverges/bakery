<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vergés | Recipes</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="Private recipe collection">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FDFBF7;
      --text: #2C2C2C;
      --text-light: #6B6B6B;
      --accent: #C4A77D;
      --card-bg: #FFFFFF;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      --tag-vegan: #7A9E7E;
      --tag-vegetarian: #D4A574;
      --border: #E8E4DE;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .header { display: flex; justify-content: space-between; align-items: center; padding: 2rem 4rem; border-bottom: 1px solid var(--border); }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 500; }
    .logo-sub { font-weight: 300; color: var(--text-light); margin-left: 0.5rem; }
    .nav-link { font-size: 0.875rem; color: var(--text-light); text-decoration: none; }
    .intro { text-align: center; padding: 1.5rem; font-size: 0.75rem; color: var(--text-light); background: rgba(196, 167, 125, 0.1); }
    .recipe-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 2rem; padding: 2rem 4rem 4rem; max-width: 1400px; margin: 0 auto; }
    .recipe-card { background: white; border-radius: 8px; padding: 2rem; box-shadow: var(--shadow); }
    .recipe-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
    .recipe-name { font-family: 'Playfair Display', serif; font-size: 1.25rem; }
    .recipe-category { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-light); }
    .recipe-section { margin-bottom: 1.5rem; }
    .recipe-section h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-light); margin-bottom: 0.75rem; }
    .recipe-section ul { list-style: none; padding-left: 0; }
    .recipe-section li { font-size: 0.875rem; padding: 0.25rem 0; border-bottom: 1px dashed var(--border); }
    .placeholder-text { font-size: 0.875rem; color: var(--text-light); font-style: italic; }
    .cost-table { width: 100%; font-size: 0.875rem; }
    .cost-table tr { border-bottom: 1px dashed var(--border); }
    .cost-table td { padding: 0.5rem 0; }
    .cost-table td:last-child { text-align: right; }
    .cost-table .total { font-weight: 500; border-bottom: 2px solid var(--text); }
    .pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    .pricing-item { text-align: center; padding: 1rem; background: var(--bg); border-radius: 4px; }
    .pricing-item .label { display: block; font-size: 0.625rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-light); margin-bottom: 0.25rem; }
    .pricing-item .value { font-family: 'Playfair Display', serif; font-size: 1.25rem; }
    .baking-info { display: flex; gap: 1rem; margin: 0.5rem 0 1rem; }
    .baking-info div { flex: 1; text-align: center; padding: 0.5rem; border: 1px solid var(--border); border-radius: 4px; }
    .baking-label { font-size: 0.625rem; text-transform: uppercase; color: var(--text-light); }
    .baking-value { font-weight: 600; }
    @media (max-width: 768px) { .header { padding: 1.5rem 2rem; } .recipe-list { grid-template-columns: 1fr; padding: 2rem; } }
  </style>
</head>
<body>
  <header class="header">
    <h1 class="logo">Vergés <span class="logo-sub">Recipes</span></h1>
    <nav class="nav">
      <a href="index.html" class="nav-link">Store</a>
    </nav>
  </header>
  <section class="intro">
    <p>Private recipe collection. Not indexed for SEO.</p>
  </section>
  <section class="recipe-list" id="recipes"></section>
  <script>
    const products = [
      { id: "sourdough", name: "Sourdough Bread", category: "bread", price: 8, ingredients: ["flour", "water", "salt", "sourdough starter"], tags: ["vegan"], image: "images/sourdough_bread.png" },
      { id: "white-sourdough", name: "White Sourdough Bread", category: "bread", price: 8, ingredients: ["flour", "water", "salt", "sourdough starter"], tags: ["vegan"], image: "images/white_sourdough_bread.png" },
      { id: "whole-grain-sourdough", name: "Whole Grain Sourdough", category: "bread", price: 9, ingredients: ["whole wheat flour", "bread flour", "water", "salt", "sourdough starter"], tags: ["vegan"], image: "images/whole_grain_sourdough.png" },
      { id: "broma-cookie", name: "Broma Chocolate Chip Cookie", category: "cookie", price: 3.5, ingredients: ["168g butter", "200g brown sugar, packed", "50g granulated sugar", "1 egg + 1 egg yolk", "15ml vanilla extract", "220g all-purpose flour", "3g baking soda", "4g kosher salt", "170g dark chocolate chunks"], tags: ["vegetarian"], image: "images/broma_cookie.png", recipe: { prep: ["Line baking sheets with parchment before starting.", "If using salted butter, omit additional kosher salt.", "Gather all ingredients and equipment before beginning."], bake: { temp: "350°F", time: "11-12 min", yield: "14 cookies" }, steps: ["Place butter in a skillet over medium heat. Let it melt, then continue cooking, stirring occasionally.", "Watch carefully as butter transforms - it will bubble, foam, then turn deep golden brown with a nutty aroma (brown butter).", "Remove from heat and pour into a heatproof bowl. Let it cool for 5-10 minutes. If too hot, it will cook the eggs.", "Add brown sugar and granulated sugar to cooled brown butter. Whisk until combined.", "Crack in the egg and add egg yolk. Pour in vanilla. Whisk until completely smooth.", "Add flour, baking soda, and kosher salt. Stir with spatula until just combined. Stop as soon as no dry flour remains.", "Fold in chocolate chunks until evenly distributed.", "Let dough rest for 10 minutes at room temperature, or cover and refrigerate for later use.", "Scoop dough onto prepared baking sheets, leaving at least 5cm between each mound.", "Bake until edges turn golden brown but centers still look slightly soft and doughy. Don't overbake.", "Remove from oven and let cool on sheet for 5 minutes. While still warm, sprinkle with flaky sea salt if desired.", "After 5 minutes, transfer to a wire rack. Best eaten warm when chocolate is still melty."], tips: ["The brown butter is what gives these cookies their incredible depth of flavor.", "Using good quality chocolate makes a noticeable difference.", "Don't overbake - cookies continue cooking on the hot pan after removing from oven."] } },
      { id: "mexican-wedding-cookies", name: "Mexican Wedding Cookies", category: "cookie", price: 2.5, ingredients: ["227g unsalted butter, room temp", "57g confectioners' sugar", "7ml vanilla extract", "5ml almond extract (optional)", "5g salt", "72g almond flour", "270g all-purpose flour", "170g confectioners' sugar (coating)"], tags: ["vegetarian"], image: "images/mexican_wedding_cookies.png", recipe: { prep: ["Preheat oven to 325°F.", "Lightly grease or line two baking sheets with parchment."], bake: { temp: "325°F", time: "15-20 min", yield: "4 dozen" }, steps: ["In a large bowl, beat together butter, sugar, vanilla, almond extract, and salt until smooth.", "Beat in almond flour, then all-purpose flour, until just combined.", "Scoop chestnut-sized (1\") pieces of dough and roll into balls. A level teaspoon cookie scoop works perfectly.", "Place balls on prepared baking sheets, leaving 1\" between them.", "Bake for 15-20 minutes until set on top. Some may start to barely brown around edges.", "While baking, put coating sugar in a shallow bowl.", "Remove from oven, cool on pan for a few minutes.", "Transfer 5-6 cookies at a time to bowl with sugar. Roll to coat evenly.", "Transfer to rack to cool completely.", "Roll in sugar again when cool for thorough snowy-white coating.", "Store airtight at room temperature for several days; freeze for longer storage."], tips: ["If using salted butter, reduce added salt to 1/2 teaspoon.", "Also known as Russian Teacakes, or Vanilla Snowballs.", "For extra tender texture, use almond flour or finely ground blanched almonds.", "Roll twice in sugar - once warm, once cool - for the classic snowy appearance."] } },
      { id: "chocolate-chip", name: "Chocolate Chip Cookie", category: "cookie", price: 3, ingredients: ["flour", "butter", "sugar", "chocolate chips", "eggs", "vanilla"], tags: ["vegetarian"], image: "images/chocolate-chip.svg" },
      { id: "moscovita", name: "Moscovita", category: "cookie", price: 3, ingredients: ["flour", "hazelnut", "cocoa", "sugar", "butter", "eggs"], tags: ["vegetarian"], image: "images/moscovita.svg" },
      { id: "butter-cookie", name: "Butter Cookie", category: "cookie", price: 2.5, ingredients: ["flour", "butter", "sugar", "eggs", "vanilla"], tags: ["vegetarian"], image: "images/butter-cookie.svg" },
      { id: "shortbread", name: "Shortbread", category: "cookie", price: 2.5, ingredients: ["flour", "butter", "sugar"], tags: ["vegetarian"], image: "images/shortbread.svg" },
      { id: "baklava", name: "Baklava", category: "cookie", price: 4, ingredients: ["phyllo dough", "butter", "walnuts", "honey", "sugar", "cinnamon"], tags: ["vegetarian"], image: "images/baklava.png" },
      { id: "caramel-walnut-tart", name: "Caramel Walnut Tart", category: "tart", price: 6, ingredients: ["flour", "butter", "walnuts", "caramel", "cream", "eggs"], tags: ["vegetarian"], image: "images/caramel-walnut-tart.svg" },
      { id: "chocolate-tart", name: "Chocolate Tart", category: "tart", price: 6, ingredients: ["flour", "butter", "dark chocolate", "cream", "eggs", "sugar"], tags: ["vegetarian"], image: "images/chocolate-tart.svg" },
      { id: "lemon-tart", name: "Lemon Tart", category: "tart", price: 5, ingredients: ["flour", "butter", "lemons", "eggs", "sugar"], tags: ["vegetarian"], image: "images/lemon-tart.svg" }
    ];
    const container = document.getElementById('recipes');
    products.forEach(product => {
      const ingredientsList = product.ingredients.map(i => `<li>${i}</li>`).join('');
      let recipeDetails = '';
      if (product.recipe) {
        const prepSteps = product.recipe.prep.map(p => `<li>${p}</li>`).join('');
        const bakeSteps = product.recipe.steps.map(s => `<li>${s}</li>`).join('');
        const tips = product.recipe.tips.map(t => `<li>${t}</li>`).join('');
        recipeDetails = `
          <div class="recipe-section">
            <h3>Preparation</h3>
            <ul>${prepSteps}</ul>
          </div>
          <div class="recipe-section">
            <h3>Baking</h3>
            <div class="baking-info">
              <div><div class="baking-label">Temp</div><div class="baking-value">${product.recipe.bake.temp}</div></div>
              <div><div class="baking-label">Time</div><div class="baking-value">${product.recipe.bake.time}</div></div>
              <div><div class="baking-label">Yield</div><div class="baking-value">${product.recipe.bake.yield}</div></div>
            </div>
          </div>
          <div class="recipe-section">
            <h3>Steps</h3>
            <ol style="padding-left: 1.2rem;">${bakeSteps}</ol>
          </div>
          <div class="recipe-section">
            <h3>Tips</h3>
            <ul>${tips}</ul>
          </div>
        `;
      } else {
        recipeDetails = `
          <div class="recipe-section">
            <h3>Execution Details</h3>
            <p class="placeholder-text">[Add execution steps for ${product.name}]</p>
          </div>
        `;
      }
      const card = document.createElement('div');
      card.className = 'recipe-card';
      card.innerHTML = `
        <div class="recipe-header">
          <h2 class="recipe-name">${product.name}</h2>
          <span class="recipe-category">${product.category}</span>
        </div>
        <div class="recipe-section">
          <h3>Ingredients</h3>
          <ul>${ingredientsList}</ul>
        </div>
        ${recipeDetails}
        <div class="recipe-section">
          <h3>Cost Breakdown</h3>
          <table class="cost-table">
            <tr><td>Flour</td><td>$--</td></tr>
            <tr><td>Butter</td><td>$--</td></tr>
            <tr><td>Other ingredients</td><td>$--</td></tr>
            <tr class="total"><td>Total cost</td><td>$--</td></tr>
          </table>
        </div>
        <div class="recipe-section">
          <h3>Pricing</h3>
          <div class="pricing-grid">
            <div class="pricing-item"><span class="label">Selling price</span><span class="value">$${product.price}</span></div>
            <div class="pricing-item"><span class="label">Cost</span><span class="value">$--</span></div>
            <div class="pricing-item"><span class="label">Margin</span><span class="value">--%</span></div>
          </div>
        </div>
        <div class="recipe-section">
          <h3>Notes</h3>
          <p class="placeholder-text">[Add notes for ${product.name}]</p>
        </div>
      `;
      container.appendChild(card);
    });
  </script>
</body>
</html>
